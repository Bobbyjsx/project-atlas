apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: project-atlas
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Crucial: enable multiple containers
        run.googleapis.com/container-dependencies: '{"atlas-gateway": ["keysentry-sidecar"]}'
    spec:
      containers:
        # --- The Ingress Gateway Container ---
        - image: gcr.io/${GCP_PROJECT_ID}/project-atlas:${ATLAS_VERSION}
          name: atlas-gateway
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY_KEYSENTRY
              valueFrom:
                secretKeyRef:
                  name: api-key-keysentry  # Name of the secret in GCP Secret Manager
                  key: latest
            - name: API_KEY_CHESS
              valueFrom:
                secretKeyRef:
                  name: api-key-chess
                  key: latest
          resources:
            limits:
              cpu: "1000m"
              memory: "512Mi"

        # --- Sidecar 1: KeySentry API ---
        - image: gcr.io/${GCP_PROJECT_ID}/keysentry-api:${KEYSENTRY_VERSION}
          name: keysentry-sidecar
          env:
            - name: PORT
              value: "8001"
            # It fetches the DB connection string natively from Google Secret Manager
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: keysentry-db-url           # Name of the secret in GCP Secret Manager
                  key: latest                      # Use the latest version of the secret
          startupProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 2
            timeoutSeconds: 2
            periodSeconds: 5
            failureThreshold: 5
